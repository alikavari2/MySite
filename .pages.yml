# تنظیمات رسانه (آپلود عکس)
media:
  input: public/images
  output: /images

# مجموعه‌های محتوا
content:
  # ۱. وبلاگ (نوشته‌ها)
  - name: blog
    label: نوشته‌ها
    type: collection
    path: src/data/post
    format: yaml-frontmatter
    fields:
      - name: title
        label: عنوان
        type: string
        required: true
      - name: publishDate
        label: تاریخ انتشار
        type: date
        default: now
        required: true
      - name: author
        label: نویسنده
        type: string
        default: علی کاویاری
      - name: category
        label: دسته‌بندی
        type: string
        default: عمومی
      - name: image
        label: تصویر شاخص
        type: image
      - name: excerpt
        label: خلاصه
        type: text
      - name: tags
        label: برچسب‌ها (با ویرگول انگلیسی جدا کنید)
        type: string
        required: false
        default: ""
      - name: body
        label: متن
        type: markdown

  # ۲. تنظیمات کامل سایت (فایل config.yaml)
  - name: settings
    label: تنظیمات سایت
    type: file
    path: src/config.yaml
    format: yaml
    fields:
      - name: site
        label: اطلاعات پایه
        type: object
        fields:
          - name: name
            label: نام سایت
            type: string
          - name: site
            label: آدرس کامل سایت
            type: string
          - name: base
            label: مسیر پایه
            type: string
          - name: trailingSlash
            label: اسلش انتهایی (true/false)
            type: boolean
          - name: googleSiteVerificationId
            label: کد تأیید گوگل
            type: string

      - name: metadata
        label: متادیتا (SEO)
        type: object
        fields:
          - name: title
            label: عنوان
            type: object
            fields:
              - name: default
                label: عنوان پیش‌فرض
                type: string
              - name: template
                label: قالب عنوان
                type: string
          - name: description
            label: توضیحات پیش‌فرض
            type: text
          - name: robots
            label: تنظیمات روبات‌ها
            type: object
            fields:
              - name: index
                label: ایندکس (true/false)
                type: boolean
              - name: follow
                label: فالو (true/false)
                type: boolean
          - name: openGraph
            label: Open Graph
            type: object
            fields:
              - name: site_name
                label: نام سایت
                type: string
              - name: images
                label: تصاویر
                type: list
                fields:
                  - name: url
                    label: آدرس تصویر
                    type: string
                  - name: width
                    label: عرض
                    type: number
                  - name: height
                    label: ارتفاع
                    type: number
              - name: type
                label: نوع
                type: string
          - name: twitter
            label: توییتر
            type: object
            fields:
              - name: handle
                label: هندل
                type: string
              - name: site
                label: آدرس
                type: string
              - name: cardType
                label: نوع کارت
                type: string

      - name: i18n
        label: زبان و جهت
        type: object
        fields:
          - name: language
            label: زبان (مثلاً fa, en)
            type: string
          - name: textDirection
            label: جهت (rtl / ltr)
            type: string

      - name: apps
        label: تنظیمات وبلاگ
        type: object
        fields:
          - name: blog
            label: وبلاگ
            type: object
            fields:
              - name: isEnabled
                label: فعال؟
                type: boolean
              - name: postsPerPage
                label: تعداد پست در هر صفحه
                type: number
              - name: post
                label: پست
                type: object
                fields:
                  - name: isEnabled
                    label: فعال؟
                    type: boolean
                  - name: permalink
                    label: ساختار پیوند
                    type: string
                  - name: robots
                    label: روبات‌ها
                    type: object
                    fields:
                      - name: index
                        label: ایندکس
                        type: boolean
              - name: list
                label: لیست
                type: object
                fields:
                  - name: isEnabled
                    label: فعال؟
                    type: boolean
                  - name: pathname
                    label: نام مسیر (مثلاً blog)
                    type: string
                  - name: robots
                    label: روبات‌ها
                    type: object
                    fields:
                      - name: index
                        label: ایندکس
                        type: boolean
              - name: category
                label: دسته‌بندی
                type: object
                fields:
                  - name: isEnabled
                    label: فعال؟
                    type: boolean
                  - name: pathname
                    label: نام مسیر
                    type: string
                  - name: robots
                    label: روبات‌ها
                    type: object
                    fields:
                      - name: index
                        label: ایندکس
                        type: boolean
              - name: tag
                label: برچسب
                type: object
                fields:
                  - name: isEnabled
                    label: فعال؟
                    type: boolean
                  - name: pathname
                    label: نام مسیر
                    type: string
                  - name: robots
                    label: روبات‌ها
                    type: object
                    fields:
                      - name: index
                        label: ایندکس
                        type: boolean
              - name: isRelatedPostsEnabled
                label: پست‌های مرتبط فعال؟
                type: boolean
              - name: relatedPostsCount
                label: تعداد پست‌های مرتبط
                type: number

      - name: analytics
        label: آنالیتیکس
        type: object
        fields:
          - name: vendors
            label: سرویس‌ها
            type: object
            fields:
              - name: googleAnalytics
                label: گوگل آنالیتیکس
                type: object
                fields:
                  - name: id
                    label: شناسه (Measurement ID)
                    type: string

      - name: ui
        label: ظاهر
        type: object
        fields:
          - name: theme
            label: تم (system, light, dark, light:only, dark:only)
            type: string

  # ۳. منوها (فایل JSON)
  - name: navigation
    label: منوها
    type: file
    path: src/data/navigation.json
    format: json
    fields:
      - name: headerData
        label: منوی اصلی
        type: object
        fields:
          - name: links
            label: آیتم‌های منو
            type: list
            fields:
              - name: text
                label: متن
                type: string
              - name: href
                label: لینک (اختیاری)
                type: string
                required: false
              - name: links
                label: زیرمنوها
                type: list
                required: false
                fields:
                  - name: text
                    label: متن
                    type: string
                  - name: href
                    label: لینک
                    type: string
          - name: actions
            label: دکمه‌های اقدام
            type: list
            fields:
              - name: text
                label: متن
                type: string
              - name: href
                label: لینک
                type: string
              - name: target
                label: باز شدن در تب جدید (_blank)
                type: string
                required: false
      - name: footerData
        label: فوتر
        type: object
        fields:
          - name: links
            label: گروه‌های لینک
            type: list
            fields:
              - name: title
                label: عنوان گروه
                type: string
              - name: links
                label: لینک‌ها
                type: list
                fields:
                  - name: text
                    label: متن
                    type: string
                  - name: href
                    label: لینک
                    type: string
          - name: secondaryLinks
            label: لینک‌های ثانویه
            type: list
            fields:
              - name: text
                label: متن
                type: string
              - name: href
                label: لینک
                type: string
          - name: socialLinks
            label: شبکه‌های اجتماعی
            type: list
            fields:
              - name: ariaLabel
                label: نام
                type: string
              - name: icon
                label: آیکون (مثلاً tabler:brand-x)
                type: string
              - name: href
                label: لینک
                type: string
          - name: footNote
            label: متن کپی‌رایت
            type: string