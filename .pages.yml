media:
  input: public/images
  output: /images

content:
  - name: blog
    label: نوشته‌ها
    type: collection
    path: src/data/post
    format: yaml-frontmatter
    sort: publishDate
    order: desc
    summary: '{{title}}'
    fields:
      - name: title
        label: عنوان
        type: string
        required: true
      - name: publishDate
        label: تاریخ انتشار
        type: datetime
        default: now
        required: true
      - name: author
        label: نویسنده
        type: string
        default: علی کواری
      - name: category_help
        label: "💡 دسته‌بندی‌های مجاز (کپی کنید)"
        type: text
        default: "physics → فیزیک | chemistry → شیمی | biology → زیست‌شناسی | earth-astronomy → زمین و نجوم | computer-science → علوم کامپیوتر | metaphysics → علوم فرامادی"
      - name: category
        label: "دسته‌بندی (یکی از موارد بالا را کپی کنید)"
        type: string
        default: biology
      - name: image_help
        label: "🖼️ کد آمادهٔ عکس (کپی کنید)"
        type: text
        default: '<img src="https://www.alikavari.ir/images/your-image.jpg" alt="توضیح" style="max-width:100%; border-radius:8px;">'
      - name: image
        label: "🖼️ تصویر شاخص"
        type: string
      - name: excerpt
        label: خلاصه
        type: text
      - name: tags
        label: برچسب‌ها (با ویرگول انگلیسی جدا کنید)
        type: string
        required: false
        default: ""
      - name: body
        label: متن
        type: markdown
