media:
  input: public/images
  output: /images

content:
  - name: blog
    label: نوشته‌ها
    type: collection
    path: src/data/post
    format: yaml-frontmatter
    fields:
      - name: title
        label: عنوان
        type: string
        required: true
      - name: publishDate
        label: تاریخ انتشار
        type: date
        default: now
        required: true
      - name: author
        label: نویسنده
        type: string
        default: علی کواری
      - name: category_help
        label: "🔹 دسته‌بندی‌های مجاز (کپی کنید): physics, chemistry, biology, earth-astronomy, computer-science, metaphysics"
        type: string
        default: "physics, chemistry, biology, earth-astronomy, computer-science, metaphysics"
      - name: category
        label: "دسته‌بندی (یکی از موارد بالا را اینجا بچسبانید)"
        type: string
        default: biology
      - name: image
        label: تصویر شاخص
        type: image
      - name: excerpt
        label: خلاصه
        type: text
      - name: tags
        label: برچسب‌ها (با ویرگول انگلیسی جدا کنید)
        type: string
        required: false
        default: ""
      - name: body
        label: متن
        type: markdown
