media:
  input: public/images
  output: /images

content:
  - name: blog
    label: نوشته‌ها
    type: collection
    path: src/data/post
    format: yaml-frontmatter
    fields:
      - name: title
        label: عنوان
        type: string
        required: true
      - name: publishDate
        label: تاریخ انتشار
        type: date
        default: now
        required: true
      - name: author
        label: نویسنده
        type: string
        default: علی کواری
      - name: category
        label: دسته‌بندی
        type: string
        default: biology
        widget: radio
        options:
          - { value: physics, label: "⚛️ فیزیک" }
          - { value: chemistry, label: "🧪 شیمی" }
          - { value: biology, label: "🧬 زیست‌شناسی" }
          - { value: earth-astronomy, label: "🌍 زمین و نجوم" }
          - { value: computer-science, label: "💻 علوم کامپیوتر" }
          - { value: metaphysics, label: "🔮 علوم فرامادی" }
      - name: image
        label: تصویر شاخص
        type: image
      - name: excerpt
        label: خلاصه
        type: text
      - name: tags
        label: برچسب‌ها (با ویرگول انگلیسی جدا کنید)
        type: string
        required: false
        default: ""
      - name: body
        label: متن
        type: markdown
